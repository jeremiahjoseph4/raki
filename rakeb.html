<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ የኔ በመሆንሽ እኮራብሻለሁ አትርሺ ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevent accidental selection, keeps clean */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #03050b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', 'System-ui', 'Tahoma', sans-serif;
            overflow: hidden;
            position: relative;
            cursor: default;
        }

        /* main card container with glassmorphic effect */
        .tribute-card {
            position: relative;
            z-index: 20;
            max-width: 900px;
            width: 88%;
            margin: 1.5rem;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 4rem 2rem 4rem 2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 220, 150, 0.3) inset, 0 0 0 4px rgba(0, 0, 0, 0.2) inset;
            padding: 2rem 1.8rem;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 215, 150, 0.6);
            text-align: center;
        }

        .tribute-card:hover {
            transform: scale(1.01);
            backdrop-filter: blur(12px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.6);
        }

        /* her image frame - dynamic background integration */
        .hero-image-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ffdd99;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4), 0 0 0 5px rgba(255, 210, 90, 0.3);
            transition: 0.2s;
        }

        .hero-image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .hero-image-frame:hover img {
            transform: scale(1.05);
        }

        /* main sentence styling */
        .main-sentence {
            font-size: clamp(1.8rem, 7vw, 3.3rem);
            font-weight: 800;
            color: #FFF5E6;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 10px #ffaa66, 0 0 5px #ff8855;
            letter-spacing: 1px;
            line-height: 1.3;
            margin: 0.8rem 0;
            word-break: break-word;
            background: linear-gradient(135deg, #FFE6C7, #FFCF9A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
            font-weight: 800;
            position: relative;
            display: inline-block;
        }

        /* alternative solid fallback */
        .alt-fallback {
            color: #fff0cf;
            text-shadow: 0 2px 5px #00000050;
        }

        .sub-message {
            font-size: 1.2rem;
            margin-top: 1rem;
            color: #ffe5b4;
            background: rgba(0, 0, 0, 0.35);
            display: inline-block;
            padding: 0.4rem 1.4rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* emoji rain canvas */
        #emoji-rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;  /* so clicking still works on card */
            z-index: 10;
            display: block;
        }

        /* decorative heart floating */
        .heart-float {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-size: 2rem;
            opacity: 0.6;
            z-index: 25;
            filter: drop-shadow(0 0 6px pink);
            animation: floatHeart 3s infinite alternate;
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.5; }
            100% { transform: translateY(-12px) rotate(5deg); opacity: 1; }
        }

        /* responsive adjustments */
        @media (max-width: 550px) {
            .tribute-card {
                padding: 1.3rem 1rem;
                border-radius: 2rem 1rem 2rem 1rem;
            }
            .hero-image-frame {
                width: 120px;
                height: 120px;
            }
            .sub-message {
                font-size: 0.9rem;
            }
        }

        /* small glow pulse on sentence */
        @keyframes gentleGlow {
            0% { text-shadow: 0 0 2px #ffb347, 0 0 4px #ffaa33; }
            100% { text-shadow: 0 0 12px #ffc173, 0 0 20px #ffaa66; }
        }
        .glow-text {
            animation: gentleGlow 1.8s infinite alternate;
        }

        /* additional micro interaction */
        .tribute-card {
            transition: all 0.25s ease;
        }
    </style>
</head>
<body>

    <!-- Canvas for emoji rain (40+ types) -->
    <canvas id="emoji-rain-canvas"></canvas>

    <!-- Decorative little floating heart (extra charm) -->
    <div class="heart-float">💖✨</div>

    <!-- Main content: includes her image, sentence, etc -->
    <div class="tribute-card">
        <div class="hero-image-frame">
            <!-- "her image" : placeholder with a stunning artistic portrait (Ethiopian beauty abstraction) 
                 but you can replace 'her_image.jpg' with actual image. For demo, we use a high-quality free stock image 
                 that represents elegance. I'm using a reliable image from unsplash via placeholder (creative commons friendly).
                 NOTE: If you have an actual image path, replace src accordingly.
                 To make it eye-catching: a radiant woman portrait with cultural elegance.
            -->
            <img id="herPhoto" src="rakeb.jpg" alt="Her beautiful portrait" 
                 onerror="this.onerror=null; this.src='https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop'">
        </div>
        <div>
            <!-- Amharic sentence with gradient and glow effect -->
            <div class="main-sentence glow-text" id="amharicSentence">
                የኔ በመሆንሽ እኮራብሻለሁ አትርሺ
            </div>
            <div class="sub-message">
                💫  💫
            </div>
        </div>
        <div style="margin-top: 24px; font-size: 0.85rem; color: #ffdca8; opacity: 0.8;">
            ✨ Ermi ✨
        </div>
    </div>

    <script>
        (function() {
            // ========================
            // 1. EMOJI RAIN with ~40+ different emojis
            // ========================
            const canvas = document.getElementById('emoji-rain-canvas');
            const ctx = canvas.getContext('2d');
            
            // Rich set of 42 diverse, colorful emojis (hearts, stars, flowers, love, celebration, etc)
            const EMOJIS_SET = [
                "❤️", "🧡", "💛", "💚", "💙", "💜", "🖤", "🤍", "🤎", "💖", "💗", "💓", "💕", "💞", "💘",
                "✨", "🌟", "⭐", "🌙", "☀️", "🌸", "🌺", "🌻", "🌹", "🥀", "🍁", "🍂", "💫", "⚡", "🔥",
                "🎉", "🎈", "💝", "🎀", "🪄", "💌", "💋", "👑", "💎", "🍀", "🌼", "🌷", "🌿", "⭐️", "🌈", "🍒"
            ];  // actually count = 46 unique emojis, plenty >40
            
            // Emoji particle class
            class EmojiParticle {
                constructor(x, y, emojiChar, size, speed, opacity) {
                    this.x = x;
                    this.y = y;
                    this.emoji = emojiChar;
                    this.size = size;      // font size in px
                    this.speed = speed;    // falling speed px/frame
                    this.opacity = opacity;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                    this.wobbleAmplitude = 0.6 + Math.random() * 1.2;
                }
                
                update(canvasWidth, canvasHeight) {
                    // move downwards
                    this.y += this.speed;
                    // slight horizontal drift (gentle sway)
                    this.x += Math.sin(this.wobble) * 0.4;
                    this.wobble += this.wobbleSpeed;
                    // reset if goes beyond bottom + some margin, top reset
                    if (this.y > canvasHeight + this.size) {
                        this.y = -this.size - Math.random() * 80;
                        this.x = Math.random() * canvasWidth;
                        // optional new random emoji for freshness
                        this.emoji = EMOJIS_SET[Math.floor(Math.random() * EMOJIS_SET.length)];
                        this.speed = 1.2 + Math.random() * 3.2;
                        this.size = 20 + Math.random() * 26;  // between 20px and 46px
                        this.opacity = 0.5 + Math.random() * 0.5;
                    }
                    // keep x within canvas boundaries (soft clamp)
                    if (this.x < -20) this.x = -20;
                    if (this.x > canvasWidth + 20) this.x = canvasWidth + 20;
                }
                
                draw(ctx) {
                    ctx.save();
                    ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Android Emoji", "EmojiOne Color", sans-serif`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "rgba(0,0,0,0.3)";
                    ctx.globalAlpha = this.opacity;
                    ctx.fillText(this.emoji, this.x, this.y);
                    ctx.restore();
                }
            }
            
            let particles = [];
            let animationId = null;
            let canvasWidth, canvasHeight;
            
            function initRain() {
                // number of emojis: around 140~180 for dense but not overwhelming rain
                const PARTICLE_COUNT = 160; 
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const randomEmoji = EMOJIS_SET[Math.floor(Math.random() * EMOJIS_SET.length)];
                    const size = 20 + Math.random() * 28;
                    const speed = 0.9 + Math.random() * 3.0;
                    const opacity = 0.5 + Math.random() * 0.5;
                    const x = Math.random() * canvasWidth;
                    const y = Math.random() * canvasHeight * 1.2 - canvasHeight * 0.2;
                    particles.push(new EmojiParticle(x, y, randomEmoji, size, speed, opacity));
                }
            }
            
            function resizeCanvas() {
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                // reinitialize particles to new dimensions
                if (particles.length > 0) {
                    // reposition particles proportionally to avoid cluster on resize
                    for (let p of particles) {
                        p.x = Math.min(canvasWidth - 20, Math.max(0, p.x));
                        p.y = p.y % (canvasHeight + 100);
                        if (p.y > canvasHeight) p.y = canvasHeight - 50;
                    }
                }
            }
            
            function drawRain() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                for (let p of particles) {
                    p.update(canvasWidth, canvasHeight);
                    p.draw(ctx);
                }
                animationId = requestAnimationFrame(drawRain);
            }
            
            // start rain system
            function startEmojiRain() {
                resizeCanvas();
                initRain();
                drawRain();
            }
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                // adjust particles not to overflow weirdly but maintain count
                for (let p of particles) {
                    if (p.x > canvasWidth) p.x = canvasWidth - 20;
                    if (p.y > canvasHeight + 50) p.y = canvasHeight * 0.2;
                }
            });
            
            // ========================
            // 2. ADDITIONAL CHARM: floating sparkle on sentence click / dynamic ripple effect
            // ========================
            const sentenceEl = document.getElementById('amharicSentence');
            // when sentence is clicked, trigger a mini celebration: extra emoji burst (transient)
            function createClickSparkle(e) {
                // create a little burst of floating emojis around click point
                const burstCount = 16;
                const container = document.body;
                for (let i = 0; i < burstCount; i++) {
                    const span = document.createElement('div');
                    const randomEmoji = EMOJIS_SET[Math.floor(Math.random() * EMOJIS_SET.length)];
                    span.innerText = randomEmoji;
                    span.style.position = 'fixed';
                    span.style.left = (e.clientX - 15 + (Math.random() * 30)) + 'px';
                    span.style.top = (e.clientY - 15 + (Math.random() * 30)) + 'px';
                    span.style.fontSize = (18 + Math.random() * 24) + 'px';
                    span.style.pointerEvents = 'none';
                    span.style.zIndex = '999';
                    span.style.opacity = '1';
                    span.style.transition = 'all 1.2s ease-out';
                    span.style.filter = 'drop-shadow(0 0 4px gold)';
                    container.appendChild(span);
                    // animate outward and fade
                    const dx = (Math.random() - 0.5) * 100;
                    const dy = (Math.random() - 0.8) * 70 - 20;
                    setTimeout(() => {
                        span.style.transform = `translate(${dx}px, ${dy}px) scale(1.3)`;
                        span.style.opacity = '0';
                    }, 10);
                    setTimeout(() => {
                        span.remove();
                    }, 1200);
                }
                // Also temporary pulse the card
                const card = document.querySelector('.tribute-card');
                card.style.transform = 'scale(1.02)';
                setTimeout(() => { card.style.transform = ''; }, 200);
            }
            
            sentenceEl.addEventListener('click', (e) => {
                createClickSparkle(e);
                // also create a heart soundless visual emphasis
            });
            
            // also add hover effect on image to enhance presence
            const heroImg = document.querySelector('.hero-image-frame img');
            if (heroImg) {
                heroImg.addEventListener('mouseenter', () => {
                    // little glow on card border
                    const card = document.querySelector('.tribute-card');
                    card.style.boxShadow = '0 0 0 3px #ffbb77 inset, 0 30px 50px black';
                    setTimeout(() => {
                        card.style.boxShadow = '';
                    }, 400);
                });
            }
            
            // ========================
            // 3. DYNAMIC GLOW TEXT + additional background style elegance
            // ========================
            // Enhance the gradient on sentence (additional random subtle color shift)
            let hueShift = 0;
            function subtleColorShift() {
                // smoothly shift text gradient for the main sentence, but keep readability.
                // we can change background gradient position or colors slightly.
                if (!sentenceEl) return;
                const angle = (hueShift % 360);
                const newGrad = `linear-gradient(${angle}deg, #FFE6C7, #FFD0A4, #FFB77C)`;
                sentenceEl.style.background = newGrad;
                sentenceEl.style.backgroundClip = 'text';
                sentenceEl.style.webkitBackgroundClip = 'text';
                hueShift = (hueShift + 0.6) % 360;
                requestAnimationFrame(() => {
                    setTimeout(subtleColorShift, 180);
                });
            }
            // start gentle gradient animation
            subtleColorShift();
            
            // ========================
            // 4. add small floating emoji in background randomly? already have rain, but add extra random stars
            //    occasionally spawn a large glowing emoji near edges for 1 second? optional extra beauty
            function occasionalGlowEmoji() {
                const extraEmoji = document.createElement('div');
                const randEm = EMOJIS_SET[Math.floor(Math.random() * EMOJIS_SET.length)];
                extraEmoji.innerText = randEm;
                extraEmoji.style.position = 'fixed';
                extraEmoji.style.left = Math.random() * window.innerWidth + 'px';
                extraEmoji.style.top = '-40px';
                extraEmoji.style.fontSize = (35 + Math.random() * 45) + 'px';
                extraEmoji.style.opacity = '0.7';
                extraEmoji.style.pointerEvents = 'none';
                extraEmoji.style.zIndex = '12';
                extraEmoji.style.transition = 'transform 2s linear, opacity 2s ease';
                extraEmoji.style.filter = 'drop-shadow(0 0 8px gold)';
                document.body.appendChild(extraEmoji);
                // animate falling slowly
                let fallInterval;
                let posY = -40;
                const step = () => {
                    posY += 1.2;
                    extraEmoji.style.top = posY + 'px';
                    if (posY > window.innerHeight + 100) {
                        clearInterval(fallInterval);
                        if(extraEmoji && extraEmoji.remove) extraEmoji.remove();
                    }
                };
                fallInterval = setInterval(step, 30);
                setTimeout(() => {
                    if(extraEmoji && extraEmoji.remove) {
                        clearInterval(fallInterval);
                        extraEmoji.remove();
                    }
                }, 7000);
            }
            
            // spawn occasional floating emojis every 3.5 seconds for more dynamic feel
            setInterval(() => {
                if (Math.random() > 0.6) { // ~40% chance each 3.5s
                    occasionalGlowEmoji();
                }
            }, 3500);
            
            // Also on window load, create some initial falling stars effect with console log silenced
            // ensure canvas is visible & fully functional.
            startEmojiRain();
            
            // Fix initial canvas rendering after font load and any edge glitch
            window.addEventListener('load', () => {
                resizeCanvas();
                // regenerate particles if needed
                if (particles.length === 0) {
                    initRain();
                } else {
                    for(let p of particles) {
                        if(p.y > canvasHeight) p.y = Math.random() * canvasHeight;
                    }
                }
                // small sparkle on first load to engage user
                const fakeEvent = { clientX: window.innerWidth/2, clientY: window.innerHeight/2 };
                setTimeout(() => {
                    // optional gentle surprise: but not to annoy just small burst
                    const cardRect = document.querySelector('.tribute-card').getBoundingClientRect();
                    const centerX = cardRect.left + cardRect.width/2;
                    const centerY = cardRect.top + cardRect.height/2;
                    const burstDiv = document.createElement('div');
                    burstDiv.style.position = 'fixed';
                    burstDiv.style.left = centerX+'px';
                    burstDiv.style.top = centerY+'px';
                    burstDiv.style.width = '10px';
                    burstDiv.style.height = '10px';
                    burstDiv.style.pointerEvents = 'none';
                    document.body.appendChild(burstDiv);
                    for(let i=0;i<12;i++) {
                        const em = document.createElement('div');
                        em.innerText = EMOJIS_SET[Math.floor(Math.random() * EMOJIS_SET.length)];
                        em.style.position = 'fixed';
                        em.style.left = (centerX - 10 + Math.random()*20)+'px';
                        em.style.top = (centerY - 10 + Math.random()*20)+'px';
                        em.style.fontSize = '22px';
                        em.style.transition = 'all 1s';
                        em.style.opacity = '1';
                        document.body.appendChild(em);
                        setTimeout(() => {
                            em.style.transform = `translate(${(Math.random()-0.5)*80}px, ${(Math.random()-0.7)*70 - 30}px)`;
                            em.style.opacity = '0';
                        }, 10);
                        setTimeout(()=>em.remove(), 1000);
                    }
                    setTimeout(()=>burstDiv.remove(), 100);
                }, 400);
            });
            
            // small safeguard for dynamic orientation
            window.addEventListener('orientationchange', () => {
                setTimeout(() => { resizeCanvas(); }, 50);
            });
            
            // manual style for the canvas to avoid any flicker
            canvas.style.display = 'block';
        })();
    </script>
</body>
</html>
